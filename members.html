<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members - Ecofin Credit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { background: #0d6efd; color: white; min-height: 100vh; }
    .nav-link { color: white !important; }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-3 col-lg-2 sidebar p-3">
        <h4 class="mb-4 text-center">ECOFIN CREDIT</h4>
        <ul class="nav flex-column">
          <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
          <li class="nav-item"><a href="members.html" class="nav-link active"><i class="fas fa-users"></i> Members</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-piggy-bank"></i> Fixed Deposits</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-hand-holding-dollar"></i> Loans</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-money-bill"></i> Payments</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-file-alt"></i> Reports</a></li>
          <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </div>

      <!-- Main Content -->
      <div class="col-md-9 col-lg-10 p-4">
        <h2>Member Registration</h2>
        <p class="text-muted">Add New Member</p>

        <div class="card shadow">
          <div class="card-body">
            <form id="memberForm">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label>Full Name</label>
                  <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label>Father/Husband Name</label>
                  <input type="text" id="fatherName" class="form-control" required>
                </div>
              </div>

              <div class="row">
                <div class="col-md-4 mb-3">
                  <label>Gender</label>
                  <select id="gender" class="form-select">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                  </select>
                </div>
                <div class="col-md-4 mb-3">
                  <label>Date of Birth</label>
                  <input type="date" id="dob" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                  <label>Mobile Number</label>
                  <input type="text" id="mobile" class="form-control" required>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label>Aadhaar Number</label>
                  <input type="text" id="aadhaar" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                  <label>PAN Number</label>
                  <input type="text" id="pan" class="form-control">
                </div>
              </div>

              <div class="mb-3">
                <label>Address</label>
                <textarea id="address" class="form-control" rows="2"></textarea>
              </div>

              <button type="button" onclick="registerMember()" class="btn btn-success btn-lg">
                <i class="fas fa-save"></i> Register Member
              </button>
            </form>

            <div id="message" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxaTfe_-uJ_gilnrsDyMuWi1YNthB8dgze1gCd0Q9uj_UqRu0ou55F4mdBtGlxfV91ZCg/exec";   // ← Update this

    async function registerMember() {
      const messageDiv = document.getElementById("message");
      messageDiv.innerHTML = "Registering member...";

      const memberData = {
        FullName: document.getElementById("fullName").value,
        FatherHusbandName: document.getElementById("fatherName").value,
        Gender: document.getElementById("gender").value,
        DOB: document.getElementById("dob").value,
        Mobile: document.getElementById("mobile").value,
        Aadhaar: document.getElementById("aadhaar").value,
        PAN: document.getElementById("pan").value,
        Address: document.getElementById("address").value
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({
            function: "addNewMember",
            params: memberData
          })
        });

        const result = await response.json();

        if (result.success) {
          messageDiv.innerHTML = `<span class="text-success">✅ Member Registered Successfully!<br>Member Number: <b>${result.memberNumber}</b></span>`;
          document.getElementById("memberForm").reset();
        } else {
          messageDiv.innerHTML = `<span class="text-danger">Failed to register member.</span>`;
        }
      } catch (error) {
        messageDiv.innerHTML = `<span class="text-danger">Connection error.</span>`;
        console.error(error);
      }
    }
  </script>
</body>
</html>
