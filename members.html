<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members - Ecofin Credit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { background: #0d6efd; color: white; min-height: 100vh; }
    .nav-link { color: white !important; }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); }
    .table th { background: #0d6efd; color: white; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-3 col-lg-2 sidebar p-3">
        <h4 class="mb-4 text-center">ECOFIN CREDIT</h4>
        <ul class="nav flex-column">
          <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
          <li class="nav-item"><a href="members.html" class="nav-link active"><i class="fas fa-users"></i> Members</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-piggy-bank"></i> Fixed Deposits</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-hand-holding-dollar"></i> Loans</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-money-bill"></i> Payments</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-file-alt"></i> Reports</a></li>
          <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </div>

      <!-- Main Content -->
      <div class="col-md-9 col-lg-10 p-4">
        <h2>Member Management</h2>

        <!-- Registration Form -->
        <div class="card shadow mb-4">
          <div class="card-header bg-success text-white">
            <h5><i class="fas fa-user-plus"></i> Register New Member</h5>
          </div>
          <div class="card-body">
            <form id="memberForm">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label>Full Name *</label>
                  <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label>Father/Husband Name *</label>
                  <input type="text" id="fatherName" class="form-control" required>
                </div>
              </div>

              <div class="row">
                <div class="col-md-4 mb-3">
                  <label>Gender</label>
                  <select id="gender" class="form-select">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                  </select>
                </div>
                <div class="col-md-4 mb-3">
                  <label>Date of Birth</label>
                  <input type="date" id="dob" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                  <label>Mobile Number *</label>
                  <input type="text" id="mobile" class="form-control" required>
                </div>
              </div>

              <button type="button" onclick="registerMember()" class="btn btn-success">
                <i class="fas fa-save"></i> Register Member
              </button>
            </form>
            <div id="message" class="mt-3"></div>
          </div>
        </div>

        <!-- Members List -->
        <div class="card shadow">
          <div class="card-header">
            <h5>All Members</h5>
            <input type="text" id="searchInput" class="form-control w-50" placeholder="Search by name or mobile..." onkeyup="searchMembers()">
          </div>
          <div class="card-body">
            <table class="table table-hover" id="membersTable">
              <thead>
                <tr>
                  <th>Member No</th>
                  <th>Full Name</th>
                  <th>Mobile</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxaTfe_-uJ_gilnrsDyMuWi1YNthB8dgze1gCd0Q9uj_UqRu0ou55F4mdBtGlxfV91ZCg/exec";

    // Load members when page loads
    window.onload = loadMembers;

    async function registerMember() {
      const messageDiv = document.getElementById("message");
      messageDiv.innerHTML = "Registering member...";

      const memberData = {
        FullName: document.getElementById("fullName").value,
        FatherHusbandName: document.getElementById("fatherName").value,
        Gender: document.getElementById("gender").value,
        DOB: document.getElementById("dob").value,
        Mobile: document.getElementById("mobile").value
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ function: "addNewMember", params: memberData })
        });
        const result = await response.json();

        if (result.success) {
          messageDiv.innerHTML = `<span class="text-success">✅ Member Registered Successfully!<br>Member Number: <b>${result.memberNumber}</b></span>`;
          document.getElementById("memberForm").reset();
          loadMembers(); // Refresh the list
        } else {
          messageDiv.innerHTML = `<span class="text-danger">Failed: ${result.error || 'Unknown error'}</span>`;
        }
      } catch (error) {
        messageDiv.innerHTML = `<span class="text-danger">Connection error. Please try again.</span>`;
        console.error(error);
      }
    }

    async function loadMembers() {
      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ function: "getAllMembers" })
        });
        const data = await response.json();

        const tbody = document.querySelector("#membersTable tbody");
        tbody.innerHTML = "";

        for (let i = 1; i < data.length; i++) {
          if (data[i][0]) { // If MemberNumber exists
            const row = `<tr>
              <td>${data[i][0]}</td>
              <td>${data[i][1]}</td>
              <td>${data[i][6] || ''}</td>
              <td><span class="badge bg-success">Active</span></td>
            </tr>`;
            tbody.innerHTML += row;
          }
        }
      } catch (e) {
        console.error("Error loading members:", e);
      }
    }

    function searchMembers() {
      const filter = document.getElementById("searchInput").value.toUpperCase();
      const rows = document.querySelectorAll("#membersTable tbody tr");
      
      rows.forEach(row => {
        const text = row.textContent.toUpperCase();
        row.style.display = text.indexOf(filter) > -1 ? "" : "none";
      });
    }
  </script>
</body>
</html>
