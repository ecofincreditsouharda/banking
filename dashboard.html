<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Ecofin Credit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { background: #0d6efd; color: white; min-height: 100vh; }
    .nav-link { color: white !important; }
    .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.2); }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .big-number { font-size: 2.2rem; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-3 col-lg-2 sidebar p-3">
        <h4 class="mb-4 text-center">ECOFIN CREDIT</h4>
        <ul class="nav flex-column">
          <li class="nav-item"><a href="dashboard.html" class="nav-link active"><i class="fas fa-home"></i> Dashboard</a></li>
          <li class="nav-item"><a href="members.html" class="nav-link"><i class="fas fa-users"></i> Members</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-piggy-bank"></i> Fixed Deposits</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-hand-holding-dollar"></i> Loans</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-money-bill"></i> Payments</a></li>
          <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-file-alt"></i> Reports</a></li>
          <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </div>

      <!-- Main Content -->
      <div class="col-md-9 col-lg-10 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2>Welcome, Administrator</h2>
            <p class="text-muted">Souharda Co-operative Ltd • Live Dashboard</p>
          </div>
          <button onclick="refreshDashboard()" class="btn btn-outline-primary">
            <i class="fas fa-refresh"></i> Refresh
          </button>
        </div>

        <div class="row">
          <div class="col-md-3 mb-4">
            <div class="card bg-primary text-white">
              <div class="card-body">
                <h6>Total Members</h6>
                <h3 id="totalMembers" class="big-number">0</h3>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-4">
            <div class="card bg-success text-white">
              <div class="card-body">
                <h6>Active FD</h6>
                <h3 id="totalFD" class="big-number">0</h3>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-4">
            <div class="card bg-warning text-white">
              <div class="card-body">
                <h6>Active Loans</h6>
                <h3 id="activeLoans" class="big-number">0</h3>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-4">
            <div class="card bg-danger text-white">
              <div class="card-body">
                <h6>Overdue Loans</h6>
                <h3 id="overdueLoans" class="big-number">0</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-header">
                <h5>Recent Members</h5>
              </div>
              <div class="card-body">
                <table class="table" id="recentMembersTable">
                  <thead>
                    <tr>
                      <th>Member No</th>
                      <th>Name</th>
                      <th>Mobile</th>
                      <th>Registered On</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxaTfe_-uJ_gilnrsDyMuWi1YNthB8dgze1gCd0Q9uj_UqRu0ou55F4mdBtGlxfV91ZCg/exec";

    window.onload = loadDashboard;

    async function loadDashboard() {
      try {
        // Get Members Data
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ function: "getAllMembers" })
        });
        const membersData = await response.json();

        // Calculate Stats
        let totalMembers = membersData.length - 1; // minus header
        document.getElementById("totalMembers").textContent = totalMembers;

        // Recent Members (Last 5)
        const tbody = document.querySelector("#recentMembersTable tbody");
        tbody.innerHTML = "";

        for (let i = membersData.length - 1; i > Math.max(0, membersData.length - 6); i--) {
          if (membersData[i][0]) {
            const row = `<tr>
              <td>${membersData[i][0]}</td>
              <td>${membersData[i][1]}</td>
              <td>${membersData[i][6] || '-'}</td>
              <td>${membersData[i][26] ? new Date(membersData[i][26]).toLocaleDateString() : '-'}</td>
            </tr>`;
            tbody.innerHTML += row;
          }
        }

      } catch (error) {
        console.error("Dashboard Error:", error);
      }
    }

    function refreshDashboard() {
      loadDashboard();
    }
  </script>
</body>
</html>
